name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'tests/**'
  pull_request:
    paths:
      - '*.py'
      - 'tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements-dev.txt

      - run: python -m pytest tests/ -v
